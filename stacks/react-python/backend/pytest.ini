[pytest]
; Tells pytest which Django settings to use
DJANGO_SETTINGS_MODULE = config.settings

; Where to find test files and how they must be named
python_files = tests/test_*.py
python_classes = Test*
python_functions = test_*

; Default options for every test run:
; -v          → verbose, shows each test name
; --tb=short  → short traceback on failures
addopts = -v --tb=short

