# pyproject.toml

[tool.black]
line-length = 88
target-version = ["py311"]
extend-exclude = '''
/(
  migrations
  | .venv
  | node_modules
)/
'''

[tool.isort]
# 'black' profile makes isort compatible with black's formatting
profile = "black"
line_length = 88
skip = ["migrations", ".venv", "node_modules"]